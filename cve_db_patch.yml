---
# cve_db_patch.yml
#
# Three-phase playbook:
#   Phase 1 (localhost)      – Read Excel, create table, upsert CVE records,
#                              register target hosts dynamically.
#   Phase 2 (patch_targets)  – SSH to each host and run its remediation commands.
#   Phase 3 (localhost)      – Write patch_date + final status back to the DB.
#
# Expected Excel column layout (configure via col_* vars below):
#   A  CVE ID          e.g. CVE-2024-1234
#   B  REMEDIATION     e.g. dnf update -y openssl
#   C  IP ADDRESS      e.g. 192.168.10.5
#   D  CVE VERSION     e.g. 3.0.2-1.el9
#   E  PATCHED VERSION e.g. 3.0.2-2.el9
#
# Required collections (see collections/requirements.yml):
#   community.general >= 9.0   (read_excel)
#   community.postgresql >= 3.0 (postgresql_query)
#
# DB credentials are read from environment variables so no secrets land in YAML.
# Export before running:
#   export AAP_DB_HOST=<host>
#   export AAP_DB_PORT=5432        (optional, default 5432)
#   export AAP_DB_NAME=aap         (optional, default aap)
#   export AAP_DB_USER=awx         (optional, default awx)
#   export AAP_DB_PASSWORD=<secret>
#
# Usage:
#   ansible-playbook cve_db_patch.yml -i localhost,
# (The -i localhost, dummy inventory is only needed for the localhost plays;
#  Phase 2 hosts are injected dynamically from the spreadsheet.)

# ─────────────────────────────────────────────────────────────────────────────
- name: "Phase 1 – Load Excel and seed the AAP database"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # ── Spreadsheet ──────────────────────────────────────────────────────────
    excel_path: "./cve_patches.xlsx"
    sheet_name: "Sheet1"

    # Column letters that map to each field.
    # Change these if your spreadsheet uses a different layout.
    col_cve:             "A"
    col_remediation:     "B"
    col_ip:              "C"
    col_cve_version:     "D"
    col_patched_version: "E"

    # ── Database connection ──────────────────────────────────────────────────
    db_host:     "{{ lookup('env', 'AAP_DB_HOST')     | default('localhost', true) }}"
    db_port:     "{{ lookup('env', 'AAP_DB_PORT')     | default(5432, true) | int }}"
    db_name:     "{{ lookup('env', 'AAP_DB_NAME')     | default('aap', true) }}"
    db_user:     "{{ lookup('env', 'AAP_DB_USER')     | default('awx', true) }}"
    db_password: "{{ lookup('env', 'AAP_DB_PASSWORD') }}"

  tasks:

    # ── 1.1  Read the spreadsheet ─────────────────────────────────────────
    - name: Read Excel sheet
      community.general.read_excel:
        path:  "{{ excel_path }}"
        sheet: "{{ sheet_name }}"
      register: excel_raw
      delegate_to: localhost

    # ── 1.2  Parse rows into a clean list ────────────────────────────────
    - name: Parse and filter rows
      set_fact:
        cve_rows: >-
          {{
            excel_raw.rows
            | selectattr(col_cve,         'defined')
            | selectattr(col_cve,         'ne', '')
            | selectattr(col_ip,          'defined')
            | selectattr(col_ip,          'ne', '')
            | selectattr(col_remediation, 'defined')
            | selectattr(col_remediation, 'ne', '')
            | rejectattr(col_cve, 'match', '^(?i)cve.*')
            | list
          }}

    - name: Report row count
      ansible.builtin.debug:
        msg: "Loaded {{ cve_rows | length }} CVE rows from {{ excel_path }}"

    - name: Fail early when no usable rows were found
      ansible.builtin.fail:
        msg: >-
          No valid rows found in '{{ excel_path }}' (sheet: {{ sheet_name }}).
          Check the file path, sheet name, and column letters.
      when: cve_rows | length == 0

    # ── 1.3  Ensure the tracking table exists ────────────────────────────
    - name: Create cve_patches table if absent
      community.postgresql.postgresql_query:
        login_host:     "{{ db_host }}"
        login_port:     "{{ db_port }}"
        db:             "{{ db_name }}"
        login_user:     "{{ db_user }}"
        login_password: "{{ db_password }}"
        query: |
          CREATE TABLE IF NOT EXISTS cve_patches (
            id               SERIAL        PRIMARY KEY,
            cve_id           VARCHAR(100)  NOT NULL,
            remediation      TEXT          NOT NULL,
            ip_address       VARCHAR(100)  NOT NULL,
            cve_version      VARCHAR(200),
            patched_version  VARCHAR(200),
            patch_date       DATE,
            status           VARCHAR(20)   NOT NULL DEFAULT 'pending',
            inserted_at      TIMESTAMPTZ   NOT NULL DEFAULT NOW(),
            updated_at       TIMESTAMPTZ   NOT NULL DEFAULT NOW(),
            UNIQUE (cve_id, ip_address)
          );

    # ── 1.4  Upsert every CVE row ─────────────────────────────────────────
    - name: Upsert CVE records into database
      community.postgresql.postgresql_query:
        login_host:     "{{ db_host }}"
        login_port:     "{{ db_port }}"
        db:             "{{ db_name }}"
        login_user:     "{{ db_user }}"
        login_password: "{{ db_password }}"
        query: |
          INSERT INTO cve_patches
            (cve_id, remediation, ip_address, cve_version, patched_version, status)
          VALUES
            (%(cve_id)s, %(remediation)s, %(ip_address)s,
             %(cve_version)s, %(patched_version)s, 'pending')
          ON CONFLICT (cve_id, ip_address) DO UPDATE SET
            remediation     = EXCLUDED.remediation,
            cve_version     = EXCLUDED.cve_version,
            patched_version = EXCLUDED.patched_version,
            status          = 'pending',
            patch_date      = NULL,
            updated_at      = NOW();
        named_args:
          cve_id:          "{{ item[col_cve]             | string | trim }}"
          remediation:     "{{ item[col_remediation]     | string | trim }}"
          ip_address:      "{{ item[col_ip]              | string | trim }}"
          cve_version:     "{{ item[col_cve_version]     | default('') | string | trim }}"
          patched_version: "{{ item[col_patched_version] | default('') | string | trim }}"
      loop: "{{ cve_rows }}"
      loop_control:
        label: "{{ item[col_cve] }} → {{ item[col_ip] }}"

    # ── 1.5  Register each unique IP as a dynamic host ────────────────────
    - name: Register unique target hosts
      ansible.builtin.add_host:
        name:         "{{ ip }}"
        groups:       patch_targets
        ansible_host: "{{ ip }}"
        # Pass only this host's CVE rows so Phase 2 doesn't need filtering.
        host_cve_rows: >-
          {{
            cve_rows | selectattr(col_ip, 'equalto', ip) | list
          }}
      vars:
        ip: "{{ item | string | trim }}"
      loop: >-
        {{
          cve_rows
          | map(attribute=col_ip)
          | map('string')
          | map('trim')
          | unique
          | list
        }}
      loop_control:
        label: "{{ item }}"

    - name: Show target hosts
      ansible.builtin.debug:
        msg: "Target hosts: {{ groups['patch_targets'] | default([]) }}"

# ─────────────────────────────────────────────────────────────────────────────
- name: "Phase 2 – Run remediation commands on each target host"
  hosts: patch_targets
  become: true
  gather_facts: false
  # serial controls parallelism; 1 = sequential (safest), increase as needed.
  serial: 1

  vars:
    col_cve:         "A"
    col_remediation: "B"

  tasks:

    - name: "Run remediation for each CVE on {{ inventory_hostname }}"
      ansible.builtin.shell: "{{ item[col_remediation] | string | trim }}"
      args:
        executable: /bin/bash
      loop: "{{ host_cve_rows }}"
      loop_control:
        label: "{{ item[col_cve] }}"
      register: remediation_results
      # ignore_errors keeps the playbook running if one command fails so we
      # can record every individual outcome in Phase 3.
      ignore_errors: true

    # Build a structured list that Phase 3 can read from hostvars.
    - name: Build per-CVE result records
      set_fact:
        patch_results: >-
          {{
            patch_results | default([]) + [
              {
                'cve_id':     item.item[col_cve] | string | trim,
                'ip_address': inventory_hostname,
                'rc':         item.rc | int,
                'stdout':     item.stdout    | default('') | truncate(2000),
                'stderr':     item.stderr    | default('') | truncate(2000)
              }
            ]
          }}
      loop: "{{ remediation_results.results }}"
      loop_control:
        label: "{{ item.item[col_cve] }}"

    - name: "Remediation summary for {{ inventory_hostname }}"
      ansible.builtin.debug:
        msg:
          - "Host   : {{ inventory_hostname }}"
          - "Total  : {{ remediation_results.results | length }}"
          - "Success: {{ remediation_results.results | selectattr('rc', 'equalto', 0) | list | length }}"
          - "Failed : {{ remediation_results.results | selectattr('rc', 'ne',      0) | list | length }}"

# ─────────────────────────────────────────────────────────────────────────────
- name: "Phase 3 – Write patch dates and final status to the database"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    db_host:     "{{ lookup('env', 'AAP_DB_HOST')     | default('localhost', true) }}"
    db_port:     "{{ lookup('env', 'AAP_DB_PORT')     | default(5432, true) | int }}"
    db_name:     "{{ lookup('env', 'AAP_DB_NAME')     | default('aap', true) }}"
    db_user:     "{{ lookup('env', 'AAP_DB_USER')     | default('awx', true) }}"
    db_password: "{{ lookup('env', 'AAP_DB_PASSWORD') }}"

  tasks:

    # Flatten all per-host result lists into one list for the DB loop.
    - name: Collect all results from patch_targets
      set_fact:
        all_patch_results: >-
          {{
            groups['patch_targets']
            | map('extract', hostvars, 'patch_results')
            | select('defined')
            | flatten
            | list
          }}

    - name: "Update patch_date and status for each CVE result"
      community.postgresql.postgresql_query:
        login_host:     "{{ db_host }}"
        login_port:     "{{ db_port }}"
        db:             "{{ db_name }}"
        login_user:     "{{ db_user }}"
        login_password: "{{ db_password }}"
        query: |
          UPDATE cve_patches
             SET status     = %(status)s,
                 -- patch_date is only set on success; reset to NULL on failure
                 patch_date = CASE WHEN %(succeeded)s THEN CURRENT_DATE ELSE NULL END,
                 updated_at = NOW()
           WHERE cve_id     = %(cve_id)s
             AND ip_address = %(ip_address)s;
        named_args:
          cve_id:     "{{ item.cve_id }}"
          ip_address: "{{ item.ip_address }}"
          succeeded:  "{{ (item.rc == 0) | bool }}"
          status:     "{{ 'patched' if item.rc == 0 else 'failed' }}"
      loop: "{{ all_patch_results }}"
      loop_control:
        label: >-
          {{ item.cve_id }} @ {{ item.ip_address }}
          → {{ 'patched' if item.rc == 0 else 'failed' }}

    # ── Final summary query ───────────────────────────────────────────────
    - name: Query final summary from database
      community.postgresql.postgresql_query:
        login_host:     "{{ db_host }}"
        login_port:     "{{ db_port }}"
        db:             "{{ db_name }}"
        login_user:     "{{ db_user }}"
        login_password: "{{ db_password }}"
        query: |
          SELECT
            status,
            COUNT(*)        AS total,
            MIN(patch_date) AS earliest_patch,
            MAX(patch_date) AS latest_patch
          FROM  cve_patches
          GROUP BY status
          ORDER BY status;
      register: db_summary

    - name: Display final summary
      ansible.builtin.debug:
        msg: "{{ db_summary.query_result }}"
